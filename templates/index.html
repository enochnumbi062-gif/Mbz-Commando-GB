<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mbz Commando GB</title>
    <style>
        /* Design de la console et ambiance CRT */
        body { 
            background: #121212; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            touch-action: manipulation; /* Optimise le tactile */
        }

        .game-container { 
            border: 12px solid #2a2a2a; 
            border-bottom-width: 30px; /* Hybride entre les deux versions */
            border-radius: 15px; 
            background: #9bbc0f; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        canvas { 
            border: 4px solid #0f380f; 
            image-rendering: pixelated; 
            display: block;
            max-width: 90vw; /* Adaptabilité mobile */
        }

        .ui-overlay { 
            color: #8bac0f; 
            font-family: 'Courier New', monospace; 
            margin-top: 10px; 
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }

        h2 { margin: 5px 0; letter-spacing: 2px; font-size: 1.2em; }
        p { color: #555; font-size: 0.7em; margin: 0; }

        /* --- CONTROLES MOBILES (DPAD + FIRE) --- */
        .mobile-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            width: 320px;
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
        }

        .btn {
            background: #2a2a2a;
            color: #8bac0f;
            border: 3px solid #0f380f;
            border-radius: 8px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            user-select: none;
            cursor: pointer;
        }

        .btn:active { background: #0f380f; color: #9bbc0f; }

        #btn-up { grid-area: up; }
        #btn-down { grid-area: down; }
        #btn-left { grid-area: left; }
        #btn-right { grid-area: right; }

        .action-zone {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            grid-column: 3;
        }

        .btn-fire {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #800; /* Bouton B/A retro */
            color: white;
            font-size: 1em;
            border: 4px solid #400;
        }

        .btn-fire:active { background: #500; }
    </style>
</head>
<body>

    <div class="game-container">
        <canvas id="gameCanvas" width="320" height="288"></canvas>
    </div>

    <div class="ui-overlay">
        <h2>MBZ COMMANDO GB</h2>
        <p>[ZQSD] Marcher - [CLIC/FIRE] Tirer</p>
    </div>

    <div class="mobile-controls">
        <div class="dpad">
            <div class="btn" id="btn-up">Z</div>
            <div class="btn" id="btn-left">Q</div>
            <div class="btn" id="btn-right">D</div>
            <div class="btn" id="btn-down">S</div>
        </div>
        <div></div> <div class="action-zone">
            <div class="btn btn-fire" id="btn-fire">FIRE</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/engine.js') }}?v={{ version }}"></script>

</body>
</html>
