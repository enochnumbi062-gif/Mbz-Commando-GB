<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbz Commando GB</title>
    <style>
        /* Design de la console et ambiance CRT */
        body { 
            background: #121212; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        .game-container { 
            border: 12px solid #2a2a2a; 
            border-bottom-width: 40px; /* Simule le bas d'une GameBoy */
            border-radius: 15px; 
            background: #9bbc0f; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }
        canvas { 
            border: 4px solid #0f380f; 
            image-rendering: pixelated; 
            display: block;
        }
        .ui-overlay { 
            color: #8bac0f; 
            font-family: 'Courier New', monospace; 
            margin-top: 15px; 
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }
        h2 { margin-bottom: 5px; letter-spacing: 2px; }
        p { color: #555; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="game-container">
        <canvas id="gameCanvas" width="320" height="288"></canvas>
    </div>

    <div class="ui-overlay">
        <h2>MBZ COMMANDO GB</h2>
        <p>[ZQSD] Marcher - [CLIC] Tirer</p>
    </div>

    <script src="{{ url_for('static', filename='js/engine.js') }}"></script>

</body>
</html>
